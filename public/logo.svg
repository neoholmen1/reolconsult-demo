<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 130">
  <!-- R icon mark -->
  <g transform="translate(100, 2)">
    <!-- Vertical bar of R -->
    <rect x="0" y="12" width="7" height="40" rx="1" fill="#D42027"/>
    <!-- Curved top of R -->
    <path d="M3.5 12 C3.5 12, 3.5 5, 10 2 C16.5 -1, 24 0, 28 4 C32 8, 32 14, 28 18 C24 22, 18 22, 14 22" stroke="#D42027" stroke-width="6.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Diagonal leg of R -->
    <line x1="16" y1="20" x2="34" y2="50" stroke="#D42027" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- "reol" text -->
  <text x="18" y="95" font-family="'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="400" fill="#1A1A1A" letter-spacing="0.5">reol</text>
  <!-- "consult" text in bold red -->
  <text x="108" y="95" font-family="'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#D42027" letter-spacing="0.5">consult</text>
  <!-- URL -->
  <text x="52" y="115" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#999" letter-spacing="2">www.reolconsult.no</text>
</svg>
